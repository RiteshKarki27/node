name: Packaging

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  REGISTRY: ghcr.io
  DOCKER_IMAGE: ghcr.io/${{ github.repository_owner }}/villas/node
  CMAKE_EXTRA_OPTS: -DCMAKE_BUILD_TYPE=Release
  CACHIX_CACHE_NAME: villas

jobs:
  # --- Stage: packaging ---
  pkg-docker:
    name: "pkg:docker [${{ matrix.arch }}]"
    runs-on: ${{ matrix.runs_on }}
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - distro: debian
            platform: linux/amd64
            arch: x86_64
            triplet: x86_64-linux-gnu
            runs_on: ubuntu-latest
          - distro: debian
            platform: linux/arm64/v8
            arch: arm64
            triplet: aarch64-linux-gnu
            runs_on: [self-hosted, linux, arm64]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - uses: docker/setup-qemu-action@v3
        if: matrix.arch != 'x86_64'
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: packaging/docker/Dockerfile.debian-multiarch
          push: ${{ github.event_name == 'push' }}
          target: app
          build-args: |
            ARCH=${{ matrix.arch }}
            TRIPLET=${{ matrix.triplet }}
            CMAKE_OPTS=${{ env.CMAKE_EXTRA_OPTS }}
            DISTRO=debian
          platforms: ${{ matrix.platform }}
          tags: ${{ env.DOCKER_IMAGE }}:${{ github.ref_name }}-${{ matrix.arch }}

  pkg-nix-arx:
    name: "pkg:nix:arx [${{ matrix.system }}]"
    runs-on: ubuntu-latest
    container:
      image: docker.nix-community.org/nixpkgs/cachix-flakes
    strategy:
      matrix:
        system: [x86_64-linux, aarch64-linux]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Configure Cachix
        run: cachix use "${{ env.CACHIX_CACHE_NAME }}"
      - name: Bundle as arx
        run: |
          cachix watch-exec $CACHIX_CACHE_NAME -- \
            nix bundle --print-build-logs --out-link bundle-arx \
            --bundler github:nix-community/nix-bundle \
            ".#villas-node-${{ matrix.system }}"
          mkdir -p artifacts
          cp -L bundle-arx artifacts/villas-${{ matrix.system }}
      - uses: actions/upload-artifact@v4
        with:
          name: villas-arx-${{ matrix.system }}
          path: artifacts/
          retention-days: 365

  pkg-nix-rpm:
    name: "pkg:nix:rpm [${{ matrix.system }}]"
    runs-on: ubuntu-latest
    container:
      image: docker.nix-community.org/nixpkgs/cachix-flakes
    strategy:
      matrix:
        system: [x86_64-linux, aarch64-linux]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Configure Cachix
        run: cachix use "${{ env.CACHIX_CACHE_NAME }}"
      - name: Bundle as RPM
        run: |
          cachix watch-exec $CACHIX_CACHE_NAME -- \
            nix bundle --print-build-logs --out-link bundle-rpm \
            --bundler github:NixOS/bundlers#toRPM \
            ".#villas-node-${{ matrix.system }}"
          mkdir -p artifacts
          cp -L bundle-rpm/*.rpm artifacts/villas-${{ matrix.system }}.rpm
      - uses: actions/upload-artifact@v4
        with:
          name: villas-rpm-${{ matrix.system }}
          path: artifacts/
          retention-days: 365

  pkg-nix-docker:
    name: "pkg:nix:docker [${{ matrix.system }}]"
    runs-on: ubuntu-latest
    container:
      image: docker.nix-community.org/nixpkgs/cachix-flakes
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        system: [x86_64-linux, aarch64-linux]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Configure Cachix
        run: cachix use "${{ env.CACHIX_CACHE_NAME }}"
      - name: Bundle as Docker image
        run: |
          mkdir -p /var/tmp/
          cachix watch-exec $CACHIX_CACHE_NAME -- \
            nix bundle --print-build-logs --out-link bundle-docker \
            --bundler github:NixOS/bundlers#toDockerImage \
            ".#villas-node-${{ matrix.system }}"
      - name: Push to registry
        run: |
          nix run nixpkgs#skopeo -- login \
            --username ${{ github.actor }} \
            --password ${{ secrets.GITHUB_TOKEN }} \
            ${{ env.REGISTRY }}
          nix run nixpkgs#skopeo -- \
            --tmpdir=${{ runner.temp }} \
            --insecure-policy \
            copy "docker-archive:./bundle-docker" \
            "docker://${{ env.DOCKER_IMAGE }}:${{ github.ref_name }}-nix-${{ matrix.system }}"
