name: Deploy

on:
  push:
    branches: [master]
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      tag:
        description: Git tag or branch to deploy
        required: true
        default: master

env:
  REGISTRY: ghcr.io
  DOCKER_IMAGE: ghcr.io/${{ github.repository_owner }}/villas/node

jobs:
  # --- Stage: deploy ---
  deploy-docker:
    name: deploy:docker
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create and push multi-arch manifest
        run: |
          docker manifest rm ${{ env.DOCKER_IMAGE }}:${{ github.ref_name }} || true
          docker manifest create ${{ env.DOCKER_IMAGE }}:${{ github.ref_name }} \
            ${{ env.DOCKER_IMAGE }}:${{ github.ref_name }}-x86_64 \
            ${{ env.DOCKER_IMAGE }}:${{ github.ref_name }}-arm64
          docker manifest push ${{ env.DOCKER_IMAGE }}:${{ github.ref_name }}

  deploy-docker-dev:
    name: deploy:docker-dev
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push dev image
        run: |
          docker push ${{ env.DOCKER_IMAGE }}/dev:${{ github.ref_name }}

  deploy-docker-dev-vscode:
    name: deploy:docker-dev-vscode
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push dev-vscode image
        run: |
          docker push ${{ env.DOCKER_IMAGE }}/dev-vscode:${{ github.ref_name }}

  # --- Stage: latest ---
  latest-docker:
    name: latest:docker
    needs: [deploy-docker]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Tag and push as latest
        run: |
          docker manifest rm ${{ env.DOCKER_IMAGE }}:latest || true
          docker manifest create ${{ env.DOCKER_IMAGE }}:latest \
            ${{ env.DOCKER_IMAGE }}:${{ github.ref_name }}-x86_64 \
            ${{ env.DOCKER_IMAGE }}:${{ github.ref_name }}-arm64
          docker manifest push ${{ env.DOCKER_IMAGE }}:latest

  latest-docker-dev:
    name: latest:docker-dev
    needs: [deploy-docker-dev]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Tag and push dev as latest
        run: |
          docker tag ${{ env.DOCKER_IMAGE }}/dev:${{ github.ref_name }} \
            ${{ env.DOCKER_IMAGE }}/dev:latest
          docker push ${{ env.DOCKER_IMAGE }}/dev:latest

  latest-docker-manual:
    name: latest:docker (manual)
    needs: [deploy-docker]
    if: github.event_name == 'workflow_dispatch' && !startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Tag and push as latest (manual)
        run: |
          docker manifest rm ${{ env.DOCKER_IMAGE }}:latest || true
          docker manifest create ${{ env.DOCKER_IMAGE }}:latest \
            ${{ env.DOCKER_IMAGE }}:${{ github.ref_name }}-x86_64 \
            ${{ env.DOCKER_IMAGE }}:${{ github.ref_name }}-arm64
          docker manifest push ${{ env.DOCKER_IMAGE }}:latest

  latest-docker-dev-manual:
    name: latest:docker-dev (manual)
    needs: [deploy-docker-dev]
    if: github.event_name == 'workflow_dispatch' && !startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Tag and push dev as latest (manual)
        run: |
          docker tag ${{ env.DOCKER_IMAGE }}/dev:${{ github.ref_name }} \
            ${{ env.DOCKER_IMAGE }}/dev:latest
          docker push ${{ env.DOCKER_IMAGE }}/dev:latest
