name: Docker Image CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:

  build:

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    name: "prepare:docker [${{ matrix.name }}]"
                    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Build Docker image
      id: fedora
      uses: docker/build-push-action@v5
      with:
        context: .
        file: packaging/docker/Dockerfile.fedora
        push: false
        tags: ghcr.io/${{ github.repository_owner }}/fedora:latest

    - name: Push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: packaging/docker/Dockerfile.fedora
        push: true
        tags: ghcr.io/${{ github.repository_owner }}/fedora:latest